<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found</title>
  <script>
    // SPA redirect for static hosts (GitHub Pages, Netlify, etc.)
    // Redirects any 404 to the root while preserving the path for client-side routing
    const path = window.location.pathname;
    const redirect = '/?redirect=' + encodeURIComponent(path);
    window.location.replace(redirect);
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
